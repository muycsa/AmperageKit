name: Build AmperageKit

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: nuget restore AmperageKit.sln

    # POPRAWKA: Automatyczne znalezienie poprawnego pliku Windows.winmd na serwerze i aktualizacja ścieżki w projekcie
    - name: Fix Hardcoded SDK Windows.winmd Path
      shell: powershell
      run: |
        $actualWinmd = (Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\UnionMetadata" -Filter "Windows.winmd" -Recurse | Select-Object -First 1).FullName
        if ($actualWinmd) {
            Write-Host "Znaleziono poprawny plik SDK: $actualWinmd" -ForegroundColor Green
            $csprojPath = "Amperage\Amperage.csproj"
            $content = Get-Content $csprojPath
            # Podmiana starej sztywnej ścieżki autora na dynamiczną ścieżkę z serwera GitHub
            $content = $content -replace '<HintPath>.*\\UnionMetadata\\.*\\Windows\.winmd<\/HintPath>', "<HintPath>$actualWinmd</HintPath>"
            Set-Content -Path $csprojPath -Value $content
        } else {
            Write-Error "Nie znaleziono pliku Windows.winmd w środowisku GitHub Actions!"
            exit 1
        }

    - name: Build Solution for x64
      run: |
        msbuild AmperageKit.sln /p:Configuration=Release /p:Platform=x64 /t:Rebuild

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: AmperageKit-x64
        path: |
          **/bin/x64/Release/*.exe
          **/bin/x64/Release/*.dll
        if-no-files-found: error
