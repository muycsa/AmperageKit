name: Build AmperageKit

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Pozwala na ręczne uruchomienie kompilacji w zakładce Actions

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        architecture: [x64, ARM64]
        configuration: [Release]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive # Kluczowe, jeśli projekt używa zewnętrznych bibliotek jak Detours

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: nuget restore AmperageKit.sln
      
    - name: Build Solution
      run: |
        msbuild AmperageKit.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.architecture }} /t:Rebuild

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: AmperageKit-${{ matrix.architecture }}
        path: |
          **/bin/${{ matrix.architecture }}/${{ matrix.configuration }}/*.exe
          **/bin/${{ matrix.architecture }}/${{ matrix.configuration }}/*.dll
        if-no-files-found: error
