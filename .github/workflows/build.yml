name: Build AmperageKit

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: nuget restore AmperageKit.sln

    # PATCH STEP: Installs the exact targeting pack to bypass the hardcoded SDK path
    - name: Install Windows Contracts MetaData Pack
      run: nuget install Microsoft.Windows.SDK.Contracts -Version 10.0.22621.755 -OutputDirectory Packages

    - name: Build Solution for x64
      run: |
        msbuild AmperageKit.sln /p:Configuration=Release /p:Platform=x64 /t:Rebuild /p:ReferencePath="${{ github.workspace }}\Packages\Microsoft.Windows.SDK.Contracts.10.0.22621.755\ref\netstandard2.0"

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: AmperageKit-x64
        path: |
          **/bin/x64/Release/*.exe
          **/bin/x64/Release/*.dll
        if-no-files-found: error
